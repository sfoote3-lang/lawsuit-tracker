<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trump Administration Lawsuit Tracker</title>
    <script>
      // GitHub Pages SPA redirect: encode the full path into the search string
      // so index.html can reconstruct the route.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
